name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: raspberry-pi-room-card-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-and-python:
    name: Repository and Python contracts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
      - name: Install hardware-free validation dependencies
        run: python -m pip install "PyMySQL==1.1.2" "Pillow==11.3.0"
      - name: Run release gates and unit tests
        run: |
          python scripts/secret_scan.py
          python scripts/check_repo.py
          python -m py_compile hardware/*.py scripts/*.py tests/*.py
          python -m unittest discover -s tests -v

  qt-client:
    name: Qt 5 and Qt 6 client builds
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Install Qt build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential qtbase5-dev qt5-qmake qt6-base-dev qt6-base-dev-tools qmake6
      - name: Build Qt 6 client from a clean directory
        run: |
          mkdir -p build/client-qt6
          cd build/client-qt6
          qmake6 ../../client/card-manager.pro
          make -j"$(nproc)"
          test -x ./card-manager
      - name: Build Qt 5 client from a clean directory
        run: |
          mkdir -p build/client-qt5
          cd build/client-qt5
          qmake ../../client/card-manager.pro
          make -j"$(nproc)"
          test -x ./card-manager
      - name: Upload Linux client artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: room-card-linux-clients-${{ github.sha }}
          path: |
            build/client-qt5/card-manager
            build/client-qt6/card-manager
          if-no-files-found: error
          retention-days: 14
